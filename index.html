<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1b3e" />
  <title>Checklist diario MAF</title>
  <style>
    :root{
      --navy:#0d1b3e; --blue:#1789c7; --gold:#c9a227; --bg:#f5f7fb;
      --card:#fff; --text:#172033; --muted:#6f7a90; --line:#e4e8f0;
      --success:#2ca66f; --danger:#d84b4b; --shadow:0 12px 30px rgba(13,27,62,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);background:linear-gradient(180deg,#edf3fb 0,#f8f9fc 260px);min-height:100vh;
    }
    button,input,select{font:inherit}
    .app{width:min(900px,100%);margin:auto;padding:18px 16px 80px}
    .topbar{
      background:var(--navy);color:#fff;padding:20px;border-radius:22px;
      box-shadow:var(--shadow);margin-bottom:16px;
    }
    .brand{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand h1{font-size:1.35rem;margin:0}.brand small{opacity:.75}
    .date-row{display:flex;gap:10px;align-items:center;margin-top:18px}
    .date-row input{width:100%;border:0;border-radius:12px;padding:12px 14px;color:var(--navy);font-weight:700}
    .icon-btn,.ghost-btn,.primary-btn,.danger-btn{
      border:0;border-radius:12px;cursor:pointer;font-weight:750;transition:.15s transform,.15s opacity;
    }
    button:active{transform:scale(.98)}
    .icon-btn{background:#fff;color:var(--navy);padding:12px 14px}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .tab{border:0;border-radius:13px;padding:12px;background:#e7ebf3;color:var(--muted);font-weight:800;cursor:pointer}
    .tab.active{background:var(--navy);color:#fff}
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;
      box-shadow:0 6px 18px rgba(13,27,62,.06);margin-bottom:14px;
    }
    .progress-head{display:flex;justify-content:space-between;gap:12px;align-items:end}
    .progress-head h2{font-size:1rem;margin:0 0 3px}.progress-head p{margin:0;color:var(--muted);font-size:.9rem}
    .percent{font-size:1.8rem;font-weight:900;color:var(--navy)}
    .progress-track{height:12px;background:#e8edf5;border-radius:999px;overflow:hidden;margin-top:13px}
    .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--success));transition:width .25s}
    .add-grid{display:grid;grid-template-columns:180px 1fr auto;gap:9px}
    .add-grid input,.add-grid select{
      min-width:0;border:1px solid var(--line);border-radius:13px;padding:13px 14px;outline:none;background:#fff
    }
    .add-grid input:focus,.add-grid select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(23,137,199,.12)}
    .primary-btn{background:var(--blue);color:#fff;padding:12px 17px}
    .ghost-btn{background:#eef2f8;color:var(--navy);padding:10px 13px}
    .section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .section-title h2{font-size:1.05rem;margin:0}.section-title span{color:var(--muted);font-size:.86rem}
    .section-card{border:1px solid var(--line);border-radius:17px;padding:14px;margin-bottom:12px;background:#fff}
    .section-header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
    .section-name{font-weight:900;color:var(--navy);font-size:1rem}
    .section-progress{font-size:.82rem;color:var(--muted);font-weight:750}
    .task-list{display:flex;flex-direction:column;gap:9px}
    .task{
      display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:11px;
      padding:12px;border:1px solid var(--line);border-radius:15px;background:#fff;
    }
    .task.done{background:#f4fbf7}
    .task-check{
      appearance:none;width:23px;height:23px;border:2px solid #b8c1d1;border-radius:7px;
      display:grid;place-content:center;cursor:pointer;margin:0
    }
    .task-check:checked{background:var(--success);border-color:var(--success)}
    .task-check:checked:after{content:"✓";color:#fff;font-weight:900;font-size:15px}
    .task-main{display:grid;gap:5px}
    .task-text{border:0;background:transparent;outline:none;width:100%;font-weight:650;color:var(--text)}
    .task-meta{font-size:.76rem;color:var(--muted)}
    .task.done .task-text{text-decoration:line-through;color:#7c8798}
    .task-actions{display:flex;gap:6px}
    .mini{border:0;border-radius:9px;background:#eef2f8;color:var(--navy);cursor:pointer;padding:7px 9px}
    .mini.delete{background:#fdecec;color:var(--danger)}
    .empty{text-align:center;color:var(--muted);padding:26px 10px}
    .history-day{border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
    .history-head{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .history-head strong{color:var(--navy)}.history-head span{font-weight:850}
    .history-section{margin-top:10px}.history-section strong{font-size:.9rem;color:#42506a}
    .history-section ul{margin:6px 0 0;padding-left:21px;color:#42506a}.history-section li{margin:5px 0}
    .footer-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
    .hidden{display:none!important}
    .notice{font-size:.82rem;color:var(--muted);text-align:center;margin-top:12px;line-height:1.45}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .chip{padding:6px 9px;border-radius:999px;background:#eef2f8;color:var(--navy);font-size:.78rem;font-weight:800}
    @media (max-width:650px){
      .app{padding:12px 10px 60px}.topbar,.card{border-radius:17px}
      .add-grid{grid-template-columns:1fr}.primary-btn{width:100%}
      .task-actions{gap:4px}.mini{padding:7px}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="brand">
        <div>
          <h1>Checklist diario MAF</h1>
          <small>Proyectos, compras, taller y actividades diarias</small>
        </div>
        <div aria-hidden="true" style="font-size:2rem">✓</div>
      </div>
      <div class="date-row">
        <button class="icon-btn" id="prevDay" title="Día anterior">←</button>
        <input type="date" id="selectedDate" />
        <button class="icon-btn" id="nextDay" title="Día siguiente">→</button>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="today">HOY</button>
      <button class="tab" data-tab="history">HISTORIAL</button>
    </nav>

    <section id="todayView">
      <div class="card">
        <div class="progress-head">
          <div>
            <h2>Progreso general del día</h2>
            <p id="progressText">0 de 0 tareas completadas</p>
          </div>
          <div class="percent" id="progressPercent">0%</div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <div class="card">
        <form class="add-grid" id="taskForm">
          <select id="taskSection" aria-label="Seleccionar área"></select>
          <input id="newTask" type="text" maxlength="160" placeholder="Escribe un pendiente..." autocomplete="off" />
          <button class="primary-btn" type="submit">+ Agregar</button>
        </form>
        <div class="legend" id="sectionLegend"></div>
      </div>

      <div id="sectionsContainer"></div>

      <div class="footer-actions">
        <button class="ghost-btn" id="carryBtn">Pasar pendientes de ayer</button>
        <button class="ghost-btn" id="clearDoneBtn">Limpiar completadas</button>
      </div>
      <p class="notice">Los cambios se guardan automáticamente en este navegador.</p>
    </section>

    <section id="historyView" class="hidden">
      <div class="card">
        <div class="section-title">
          <h2>Historial diario</h2>
          <span>Últimos 30 días</span>
        </div>
        <div id="historyList"></div>
      </div>
      <div class="footer-actions">
        <button class="ghost-btn" id="exportBtn">Exportar respaldo</button>
        <label class="ghost-btn" style="cursor:pointer">
          Importar respaldo
          <input class="hidden" id="importInput" type="file" accept=".json,application/json" />
        </label>
      </div>
    </section>
  </main>

<script>
(() => {
  const STORAGE_KEY = "maf_checklist_v2";
  const OLD_KEY = "maf_checklist_v1";

  const SECTIONS = [
    "Proyectos",
    "Compras",
    "Tareas del personal del taller",
    "Actividades diarias",
    "Dirección",
    "Comercial y cotizaciones",
    "Ingeniería y diseño",
    "Administración",
    "Reuniones",
    "Otros"
  ];

  const $ = id => document.getElementById(id);
  const selectedDate = $("selectedDate");
  const sectionsContainer = $("sectionsContainer");
  const newTask = $("newTask");
  const taskSection = $("taskSection");

  function localISO(date = new Date()) {
    const d = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
    return d.toISOString().slice(0,10);
  }

  function loadData() {
    try {
      const current = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (current?.days) return current;

      const old = JSON.parse(localStorage.getItem(OLD_KEY));
      if (old?.days) {
        Object.values(old.days).forEach(tasks => tasks.forEach(t => t.section = t.section || "Otros"));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(old));
        return old;
      }
    } catch {}
    return {days:{}};
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  let data = loadData();
  selectedDate.value = localISO();

  taskSection.innerHTML = SECTIONS.map(s => `<option value="${s}">${s}</option>`).join("");
  $("sectionLegend").innerHTML = SECTIONS.map(s => `<span class="chip">${s}</span>`).join("");

  function dayTasks(dateKey) {
    if (!data.days[dateKey]) data.days[dateKey] = [];
    data.days[dateKey].forEach(t => t.section = t.section || "Otros");
    return data.days[dateKey];
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  }

  function escapeHtml(value="") {
    return value.replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[c]));
  }

  function formatDate(dateKey) {
    return new Intl.DateTimeFormat("es-MX", {
      weekday:"long", day:"numeric", month:"long", year:"numeric"
    }).format(new Date(dateKey + "T12:00:00"));
  }

  function render() {
    const tasks = dayTasks(selectedDate.value);
    sectionsContainer.innerHTML = "";

    SECTIONS.forEach(section => {
      const sectionTasks = tasks.filter(t => t.section === section);
      if (!sectionTasks.length) return;

      const done = sectionTasks.filter(t => t.done).length;
      const card = document.createElement("section");
      card.className = "section-card";
      card.innerHTML = `
        <div class="section-header">
          <div class="section-name">${section}</div>
          <div class="section-progress">${done} de ${sectionTasks.length} completadas</div>
        </div>
        <div class="task-list"></div>`;

      const list = card.querySelector(".task-list");

      sectionTasks.forEach(task => {
        const globalIndex = tasks.indexOf(task);
        const row = document.createElement("div");
        row.className = "task" + (task.done ? " done" : "");
        row.innerHTML = `
          <input class="task-check" type="checkbox" ${task.done ? "checked" : ""} aria-label="Marcar tarea">
          <div class="task-main">
            <input class="task-text" value="${escapeHtml(task.text)}" maxlength="160" aria-label="Editar tarea">
            <div class="task-meta">${section}</div>
          </div>
          <div class="task-actions">
            <button class="mini" title="Cambiar de sección">↔</button>
            <button class="mini delete" title="Eliminar">×</button>
          </div>`;

        const check = row.querySelector(".task-check");
        const text = row.querySelector(".task-text");
        const [move, del] = row.querySelectorAll(".mini");

        check.addEventListener("change", () => {
          task.done = check.checked;
          task.completedAt = task.done ? new Date().toISOString() : null;
          saveData(); render();
        });

        text.addEventListener("change", () => {
          const value = text.value.trim();
          if (value) task.text = value;
          saveData(); render();
        });

        move.addEventListener("click", () => {
          const currentIndex = SECTIONS.indexOf(task.section);
          task.section = SECTIONS[(currentIndex + 1) % SECTIONS.length];
          saveData(); render();
        });

        del.addEventListener("click", () => {
          if (confirm("¿Eliminar este pendiente?")) {
            tasks.splice(globalIndex,1);
            saveData(); render();
          }
        });

        list.appendChild(row);
      });

      sectionsContainer.appendChild(card);
    });

    if (!tasks.length) {
      sectionsContainer.innerHTML = `<div class="card empty">No hay pendientes para este día.</div>`;
    }

    const completed = tasks.filter(t => t.done).length;
    const total = tasks.length;
    const percent = total ? Math.round(completed / total * 100) : 0;
    $("progressText").textContent = `${completed} de ${total} tareas completadas`;
    $("progressPercent").textContent = `${percent}%`;
    $("progressFill").style.width = `${percent}%`;
    saveData();
  }

  $("taskForm").addEventListener("submit", e => {
    e.preventDefault();
    const text = newTask.value.trim();
    if (!text) return;
    dayTasks(selectedDate.value).push({
      id:uid(), text, section:taskSection.value, done:false,
      createdAt:new Date().toISOString(), completedAt:null
    });
    newTask.value = "";
    saveData(); render(); newTask.focus();
  });

  selectedDate.addEventListener("change", render);

  function shiftDate(days) {
    const d = new Date(selectedDate.value + "T12:00:00");
    d.setDate(d.getDate() + days);
    selectedDate.value = localISO(d);
    render();
  }

  $("prevDay").addEventListener("click", () => shiftDate(-1));
  $("nextDay").addEventListener("click", () => shiftDate(1));

  $("carryBtn").addEventListener("click", () => {
    const current = selectedDate.value;
    const d = new Date(current + "T12:00:00");
    d.setDate(d.getDate() - 1);
    const previous = localISO(d);
    const existing = dayTasks(current).map(t => `${t.section}|${t.text.toLowerCase()}`);
    const pending = dayTasks(previous).filter(t =>
      !t.done && !existing.includes(`${t.section}|${t.text.toLowerCase()}`)
    );
    pending.forEach(t => dayTasks(current).push({
      id:uid(), text:t.text, section:t.section || "Otros", done:false,
      createdAt:new Date().toISOString(), completedAt:null
    }));
    saveData(); render();
    alert(pending.length ? `${pending.length} pendiente(s) agregado(s).` : "No hay pendientes nuevos para pasar.");
  });

  $("clearDoneBtn").addEventListener("click", () => {
    const tasks = dayTasks(selectedDate.value);
    const completed = tasks.filter(t => t.done).length;
    if (!completed) return alert("No hay tareas completadas.");
    if (confirm(`¿Quitar ${completed} tarea(s) completada(s) de este día?`)) {
      data.days[selectedDate.value] = tasks.filter(t => !t.done);
      saveData(); render();
    }
  });

  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const isToday = btn.dataset.tab === "today";
      $("todayView").classList.toggle("hidden", !isToday);
      $("historyView").classList.toggle("hidden", isToday);
      if (!isToday) renderHistory();
    });
  });

  function renderHistory() {
    const container = $("historyList");
    const keys = Object.keys(data.days)
      .filter(k => data.days[k].length)
      .sort((a,b) => b.localeCompare(a))
      .slice(0,30);

    if (!keys.length) {
      container.innerHTML = `<div class="empty">Todavía no hay historial.</div>`;
      return;
    }

    container.innerHTML = keys.map(key => {
      const tasks = data.days[key];
      const done = tasks.filter(t => t.done).length;
      const percent = tasks.length ? Math.round(done/tasks.length*100) : 0;

      const grouped = SECTIONS.map(section => {
        const sectionTasks = tasks.filter(t => (t.section || "Otros") === section);
        if (!sectionTasks.length) return "";
        const items = sectionTasks.map(t => `<li>${t.done?"✓":"○"} ${escapeHtml(t.text)}</li>`).join("");
        return `<div class="history-section"><strong>${section}</strong><ul>${items}</ul></div>`;
      }).join("");

      return `
        <div class="history-day">
          <div class="history-head">
            <strong>${formatDate(key)}</strong>
            <span>${percent}%</span>
          </div>
          ${grouped}
        </div>`;
    }).join("");
  }

  $("exportBtn").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `respaldo-checklist-maf-${localISO()}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  $("importInput").addEventListener("change", async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const imported = JSON.parse(await file.text());
      if (!imported.days || typeof imported.days !== "object") throw new Error();
      if (confirm("Esto reemplazará los datos actuales. ¿Continuar?")) {
        data = imported; saveData(); render(); renderHistory();
      }
    } catch {
      alert("El archivo no es un respaldo válido.");
    }
    e.target.value = "";
  });

  render();
})();
</script>
</body>
</html>
